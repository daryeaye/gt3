  <script>
    const TUTORIAL_IMAGES = [
      "https://daryeaye.github.io/geotopia/t2.jpg",
      "https://daryeaye.github.io/geotopia/t3.jpg"
    ];

    const APP_ID = "losttreasure-pt3";
    const WORKER_BASE_URL = "https://geotopia-powerfall-auth-api.daryeaye.workers.dev";
    const SESSION_STORAGE = {
      token: "lt3_auth_token",
      username: "lt3_auth_username"
    };
    const TUTORIAL_STORAGE_KEY = "lt3_tutorial_seen";

    const INTRO_URL = "https://www.youtube.com/watch?v=lr_bH9Ory8E";
    const ROLE_PDF_URLS = {
      officer: "https://daryeaye.github.io/geotopia/GT1%20Officer+.pdf",
      professor: "https://daryeaye.github.io/geotopia/GT1%20Professor+.pdf",
      hacker: "https://daryeaye.github.io/geotopia/GT1%20Hacker+.pdf"
    };

    const expectedAnswers = {
      answer1: "opposite",
      answer2: "ed",
      answer3: "adjacent",
      answer4: "complementary",
      answer5: "54",
      answer6: "supplementary",
      answer7: "180",
      answer8: "27"
    };

    const finalAnswers = {
      8:"20", 9:"5", 10:"29", 11:"26", 12:"8",
      13:"19", 14:"18", 15:"54", 16:"20", 17:"7", 18:"45"
    };

    let currentPage = 1;
    const totalPages = 21;
    let maxPageVisited = 1;
    let currentPdfUrl = "";
    let currentPdfRole = "";
    let pdfScrollTop = 0;

    let authToken = "";
    let loggedInUsername = "";
    let autoSaveTimer = null;
    let saveInFlight = false;
    let saveQueued = false;
    let isApplyingRemoteData = false;
    let tutorialIndex = 0;

    function openIntro() {
      window.open(INTRO_URL, "_blank");
    }

    function setSaveStatus(text) {
      document.getElementById("saveStatus").textContent = text;
    }

    function setAuthStatus(message, isError = false) {
      const authStatus = document.getElementById("authStatus");
      authStatus.textContent = message;
      authStatus.style.color = isError ? "#b00020" : "#222";
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function closeCustomPopup() {
      document.getElementById("customPopupOverlay").style.display = "none";
      document.getElementById("customPopupMessage").textContent = "";
      document.getElementById("customPopupButtons").innerHTML = "";
    }

    function showCustomPopup(message, buttons = [{ text: "OK", action: closeCustomPopup }]) {
      const overlay = document.getElementById("customPopupOverlay");
      const msg = document.getElementById("customPopupMessage");
      const btnWrap = document.getElementById("customPopupButtons");

      msg.textContent = message;
      btnWrap.innerHTML = "";

      buttons.forEach(btn => {
        const b = document.createElement("button");
        b.className = "popupBtn";
        b.textContent = btn.text;
        b.onclick = () => {
          closeCustomPopup();
          if (btn.action) btn.action();
        };
        btnWrap.appendChild(b);
      });

      overlay.style.display = "flex";
    }

    function showMessagePopup(message) {
      showCustomPopup(message, [{ text: "OK", action: closeCustomPopup }]);
    }

    function setAuthModalStatus(message, isError = false) {
      const status = document.getElementById("authModalStatus");
      if (!status) return;
      status.textContent = message || "";
      status.style.color = isError ? "#b00020" : "#222";
    }

    function openAuthOverlay(prefillUsername = "") {
      const overlay = document.getElementById("authOverlay");
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");

      if (prefillUsername) {
        usernameInput.value = prefillUsername;
      } else if (loggedInUsername) {
        usernameInput.value = loggedInUsername;
      }

      passwordInput.value = "";
      setAuthModalStatus("Please sign in to continue.", false);
      overlay.style.display = "flex";
      usernameInput.focus();
    }

    function closeAuthOverlay() {
      const overlay = document.getElementById("authOverlay");
      overlay.style.display = "none";
      setAuthModalStatus("", false);
    }

    function maybeRequireAuthOverlay() {
      if (!authToken) {
        openAuthOverlay(loggedInUsername || "");
      }
    }

    function updateAuthUI() {
      const loggedIn = !!authToken;
      document.getElementById("logoutBtn").style.display = loggedIn ? "inline-block" : "none";
      setAuthStatus(loggedIn ? ("Logged in as " + (loggedInUsername || "student")) : "Not logged in", false);
      if (loggedIn) {
        closeAuthOverlay();
      }
    }

    function saveSessionLocally(token, username) {
      authToken = token || "";
      loggedInUsername = username || "";
      localStorage.setItem(SESSION_STORAGE.token, authToken);
      localStorage.setItem(SESSION_STORAGE.username, loggedInUsername);
      updateAuthUI();
    }

    function clearSessionLocally() {
      authToken = "";
      loggedInUsername = "";
      localStorage.removeItem(SESSION_STORAGE.token);
      localStorage.removeItem(SESSION_STORAGE.username);
      updateAuthUI();
    }

    function restoreSessionLocally() {
      authToken = localStorage.getItem(SESSION_STORAGE.token) || "";
      loggedInUsername = localStorage.getItem(SESSION_STORAGE.username) || "";
      updateAuthUI();
    }

    async function apiFetch(path, options = {}) {
      const headers = {
        "Content-Type": "application/json",
        ...(options.headers || {})
      };

      if (authToken) {
        headers.Authorization = "Bearer " + authToken;
      }

      const response = await fetch(WORKER_BASE_URL + path, {
        method: options.method || "GET",
        headers,
        body: options.body
      });

      const json = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(json.error || "Request failed");
      }
      return json;
    }

    function getPageInputElements() {
      return Array.from(document.querySelectorAll('#container input[type="text"]'));
    }

    function getInputSnapshot() {
      const snapshot = {};
      getPageInputElements().forEach(el => {
        if (el.id) snapshot[el.id] = el.value || "";
      });
      return snapshot;
    }

    function applyInputSnapshot(snapshot) {
      getPageInputElements().forEach(el => {
        if (!el.id) return;
        el.value = snapshot && Object.prototype.hasOwnProperty.call(snapshot, el.id)
          ? (snapshot[el.id] ?? "")
          : "";
      });
      refreshPage3State();
    }

    function refreshPage3State() {
      Object.entries(expectedAnswers).forEach(([answerId, expected]) => {
        const input = document.getElementById(answerId);
        const picId = "pic" + answerId.replace("answer", "");
        const pic = document.getElementById(picId);
        if (!input || !pic) return;

        if ((input.value || "").trim().toLowerCase() === expected) {
          pic.style.display = "block";
          input.style.display = "none";
        } else {
          pic.style.display = "none";
          input.style.display = "block";
        }
      });
    }

    function buildProgressPayload() {
      const viewer = document.getElementById("pdfViewer");
      return {
        playerName: loggedInUsername,
        currentPage,
        maxPageVisited,
        currentPdfUrl,
        currentPdfRole,
        pdfScrollTop: viewer ? viewer.scrollTop : 0,
        inputValues: getInputSnapshot()
      };
    }

    async function applyProgressPayload(payload) {
      isApplyingRemoteData = true;

      const safe = payload && typeof payload === "object" ? payload : {};
      applyInputSnapshot(safe.inputValues || {});

      currentPage = Number.isInteger(Number(safe.currentPage)) ? Number(safe.currentPage) : 1;
      if (currentPage < 1) currentPage = 1;
      if (currentPage > totalPages) currentPage = totalPages;

      maxPageVisited = Number.isInteger(Number(safe.maxPageVisited)) ? Number(safe.maxPageVisited) : currentPage;
      if (maxPageVisited < 1) maxPageVisited = 1;
      if (maxPageVisited > totalPages) maxPageVisited = totalPages;

      currentPdfUrl = String(safe.currentPdfUrl || "");
      currentPdfRole = String(safe.currentPdfRole || "");
      pdfScrollTop = Number.isFinite(Number(safe.pdfScrollTop)) ? Number(safe.pdfScrollTop) : 0;

      showPage(currentPage);

      if (currentPdfUrl) {
        try {
          await renderPdfIntoSecondCanvas(currentPdfUrl, currentPdfRole, pdfScrollTop);
        } catch (err) {
          console.error(err);
        }
      } else {
        exitPdfMode();
      }

      isApplyingRemoteData = false;
    }

    async function registerUser() {
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");

      const rawUsername = usernameInput.value || "";
      const username = rawUsername.trim().toLowerCase();
      const password = passwordInput.value;

      if (!username || !password) {
        setAuthStatus("Enter username and password", true);
        setAuthModalStatus("Enter username and password.", true);
        return;
      }

      if (/\s/.test(rawUsername)) {
        setAuthStatus("Username cannot contain spaces", true);
        setAuthModalStatus("Username cannot contain spaces.", true);
        return;
      }

      setAuthStatus("Registering...");
      setAuthModalStatus("Registering...", false);

      try {
        const result = await apiFetch("/api/register", {
          method: "POST",
          body: JSON.stringify({ username, password, appId: APP_ID })
        });

        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";
        await loadProgressFromServer();
        setAuthModalStatus("Account created.", false);
        closeAuthOverlay();
      } catch (err) {
        setAuthStatus(err.message || "Register failed", true);
        setAuthModalStatus(err.message || "Register failed", true);
      }
    }

    async function loginUser() {
      const usernameInput = document.getElementById("auth-username");
      const passwordInput = document.getElementById("auth-password");

      const rawUsername = usernameInput.value || "";
      const username = rawUsername.trim().toLowerCase();
      const password = passwordInput.value;

      if (!username || !password) {
        setAuthStatus("Enter username and password", true);
        setAuthModalStatus("Enter username and password.", true);
        return;
      }

      if (/\s/.test(rawUsername)) {
        setAuthStatus("Username cannot contain spaces", true);
        setAuthModalStatus("Username cannot contain spaces.", true);
        return;
      }

      setAuthStatus("Logging in...");
      setAuthModalStatus("Logging in...", false);

      try {
        const result = await apiFetch("/api/login", {
          method: "POST",
          body: JSON.stringify({ username, password, appId: APP_ID })
        });

        saveSessionLocally(result.token, result.username || username);
        passwordInput.value = "";
        await loadProgressFromServer();
        setAuthModalStatus("Logged in.", false);
        closeAuthOverlay();
      } catch (err) {
        setAuthStatus(err.message || "Login failed", true);
        setAuthModalStatus(err.message || "Login failed", true);
      }
    }

    async function loadProgressFromServer() {
      if (!authToken) return;

      try {
        const result = await apiFetch("/api/load?appId=" + encodeURIComponent(APP_ID), { method: "GET" });

        if (result.username) {
          loggedInUsername = result.username;
          localStorage.setItem(SESSION_STORAGE.username, loggedInUsername);
        }

        updateAuthUI();
        await applyProgressPayload(result.saveData || {});
        setSaveStatus("Loaded");
      } catch (err) {
        setAuthStatus(err.message || "Could not load progress", true);
      }
    }

    async function saveProgressToServer() {
      if (!authToken || saveInFlight || isApplyingRemoteData) return;

      saveInFlight = true;
      try {
        setSaveStatus("Saving...");
        await apiFetch("/api/save", {
          method: "POST",
          body: JSON.stringify({
            appId: APP_ID,
            saveData: buildProgressPayload()
          })
        });
        setSaveStatus("Saved");
      } catch (err) {
        setAuthStatus(err.message || "Save failed", true);
        setSaveStatus("Save failed");
      } finally {
        saveInFlight = false;
        if (saveQueued) {
          saveQueued = false;
          saveProgressToServer();
        }
      }
    }

    function queueCloudSave() {
      if (isApplyingRemoteData || !authToken) return;

      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(() => {
        if (saveInFlight) {
          saveQueued = true;
          return;
        }
        saveProgressToServer();
      }, 900);
    }

    async function flushPendingSaveBeforeLogout() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = null;

      if (!authToken || isApplyingRemoteData) return;

      if (saveInFlight) {
        saveQueued = true;
        while (saveInFlight) {
          await wait(80);
        }
      }

      await saveProgressToServer();

      while (saveInFlight) {
        await wait(80);
      }
    }

    async function logoutUser() {
      try {
        await flushPendingSaveBeforeLogout();
      } catch (err) {
        console.error(err);
      }

      try {
        if (authToken) {
          await apiFetch("/api/logout", {
            method: "POST",
            body: "{}"
          });
        }
      } catch (err) {
        console.error(err);
      }

      const prefill = loggedInUsername || "";
      clearSessionLocally();
      setSaveStatus("Not saved yet");
      openAuthOverlay(prefill);
    }

    function updateProgress() {
      const p = (maxPageVisited / totalPages) * 100;
      document.getElementById("progress").style.width = p + "%";
      document.getElementById("progressText").innerText = p.toFixed(0) + "% completed";
    }

    function showPage(p) {
      currentPage = p;
      if (currentPage > maxPageVisited) maxPageVisited = currentPage;

      for (let i = 1; i <= totalPages; i++) {
        document.getElementById("page" + i).classList.remove("active");
      }
      document.getElementById("page" + p).classList.add("active");

      document.getElementById("prev-btn").style.display = p === 1 ? "none" : "inline-block";
      if (p === totalPages || p === 20) {
        document.getElementById("next-btn").style.display = "none";
      } else {
        document.getElementById("next-btn").style.display = "inline-block";
      }

      updateProgress();
    }

    async function runCanvasTransition(action) {
      const overlay = document.getElementById("pageTransitionOverlay");
      overlay.style.pointerEvents = "auto";
      overlay.style.opacity = "1";
      await wait(280);
      action();
      await wait(60);
      overlay.style.opacity = "0";
      await wait(280);
      overlay.style.pointerEvents = "none";
    }

    async function nextPage() {
      if (currentPage === 6) {
        for (let i = 1; i <= 8; i++) {
          if (document.getElementById("pic" + i).style.display !== "block") {
            showMessagePopup("Let's bring the answers of the chopstick rules back to Master Li.");
            return;
          }
        }
      }

      if (currentPage >= 8 && currentPage <= 18) {
        const id = currentPage <= 13 ? ("p" + currentPage + "box5") : ("p" + currentPage + "box4");
        const inp = document.getElementById(id);
        if (!inp || inp.value.trim() !== finalAnswers[currentPage]) {
          showMessagePopup("🚫 Incorrect house number.");
          return;
        }
      }

      if (currentPage < totalPages && currentPage !== 20) {
        await runCanvasTransition(() => {
          showPage(currentPage + 1);
        });
        queueCloudSave();
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        showPage(currentPage - 1);
        queueCloudSave();
      }

    function exitPdfMode() {

    function initPdfJs() {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    async function renderPdfIntoSecondCanvas(pdfUrl, roleName = "", targetScrollTop = 0) {
      currentPdfUrl = pdfUrl || "";
      currentPdfRole = roleName || "";
      pdfScrollTop = targetScrollTop || 0;

      const roleContainer = document.getElementById("role-container");
      const viewer = document.getElementById("pdfViewer");
      const status = document.getElementById("pdfStatus");

      roleContainer.classList.add("pdf-mode");
      viewer.style.display = "block";
      viewer.innerHTML = "";
      viewer.scrollTop = 0;

      status.style.display = "block";
      status.textContent = "Loading PDF...";

      try {
        const loadingTask = pdfjsLib.getDocument({ url: pdfUrl });
        const pdf = await loadingTask.promise;
        status.textContent = "Rendering pages...";

        const targetWidth = 920;
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          const page = await pdf.getPage(pageNum);
          const viewport1 = page.getViewport({ scale: 1 });
          const scale = targetWidth / viewport1.width;
          const viewport = page.getViewport({ scale });

          const canvas = document.createElement("canvas");
          canvas.className = "pdfPageCanvas";
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);

          const ctx = canvas.getContext("2d", { alpha: false });
          viewer.appendChild(canvas);

          await page.render({ canvasContext: ctx, viewport }).promise;
        }

        status.style.display = "none";
        viewer.scrollTop = targetScrollTop || 0;
        queueCloudSave();
      } catch (err) {
        console.error("PDF.js render error:", err);
        status.textContent = "Failed to load PDF.";
      }
    }

    function initTranslationScreenshotTool() {
      document.getElementById("select-text").addEventListener("click", function() {
        const o = document.createElement("div");
        o.id = "selection-overlay";
        document.body.appendChild(o);

        let sX, sY, sB;

        o.addEventListener("mousedown", function(e) {
          sX = e.clientX;
          sY = e.clientY;

          sB = document.createElement("div");
          sB.id = "selection-box";
          sB.style.left = sX + "px";
          sB.style.top = sY + "px";
          sB.style.width = "0px";
          sB.style.height = "0px";
          o.appendChild(sB);

          function mH(e) {
            const cX = e.clientX, cY = e.clientY;
            const l = Math.min(sX, cX), t = Math.min(sY, cY);
            const w = Math.abs(cX - sX), h = Math.abs(cY - sY);
            sB.style.left = l + "px";
            sB.style.top = t + "px";
            sB.style.width = w + "px";
            sB.style.height = h + "px";
          }

          function uH() {
            o.removeEventListener("mousemove", mH);
            o.removeEventListener("mouseup", uH);

            const r = sB.getBoundingClientRect();
            document.body.removeChild(o);

            const T = document.getElementById("container");
            const TR = T.getBoundingClientRect();

            html2canvas(T, { useCORS: true, allowTaint: false }).then(canvas => {
              const sf = canvas.width / TR.width;
              const sx = (r.left - TR.left) * sf;
              const sy = (r.top - TR.top) * sf;
              const sw = r.width * sf;
              const sh = r.height * sf;

              const cc = document.createElement("canvas");
              cc.width = sw;
              cc.height = sh;

              const ctx = cc.getContext("2d");
              ctx.drawImage(canvas, sx, sy, sw, sh, 0, 0, sw, sh);

              cc.toBlob(blob => {
                if (!blob) return;

                const itm = new ClipboardItem({ "image/png": blob });
                navigator.clipboard.write([itm]).then(() => {
                  showMessagePopup("Screenshot copied to clipboard.");
                }).catch(err => {
                  console.error("Failed to copy screenshot to clipboard", err);
                  showMessagePopup("Failed to copy screenshot to clipboard.");
                });
              });
            });
          }

          o.addEventListener("mousemove", mH);
          o.addEventListener("mouseup", uH);
        });
      });
    }

    function showTutorial() {
      const alreadySeen = localStorage.getItem(TUTORIAL_STORAGE_KEY);
      if (alreadySeen === "yes") {
        maybeRequireAuthOverlay();
        return;
      }

      tutorialIndex = 0;
      document.getElementById("tutorialImage").src = TUTORIAL_IMAGES[tutorialIndex];
      document.getElementById("tutorialOverlay").style.display = "flex";
    }

    function nextTutorialSlide() {
      tutorialIndex++;
      if (tutorialIndex >= TUTORIAL_IMAGES.length) {
        document.getElementById("tutorialOverlay").style.display = "none";
        localStorage.setItem(TUTORIAL_STORAGE_KEY, "yes");
        maybeRequireAuthOverlay();
        return;
      }
      document.getElementById("tutorialImage").src = TUTORIAL_IMAGES[tutorialIndex];
    }
